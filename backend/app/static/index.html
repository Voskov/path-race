<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<title>Path Race</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="static/icon.svg">
<link rel="apple-touch-icon" href="static/icon.svg">
<link rel="stylesheet" href="static/styles.css">

<div id="app">
  <header id="topbar">
    <div id="trip-info">
      <span id="direction-badge" class="badge"></span>
      <span id="net-badge" class="badge net" title="sync status"></span>
    </div>
    <a id="stats-link" href="stats" class="ghost-btn">Stats</a>
  </header>

  <div id="current-label" class="current-label"></div>

  <!-- rare actions live at the top, out of the thumb zone -->
  <section id="trip-controls" hidden>
    <div class="crowding" role="group" aria-label="crowding">
      <span class="ctl-label">Crowding</span>
      <button data-crowding="1" class="crowd-btn" title="seat">1·seat</button>
      <button data-crowding="2" class="crowd-btn" title="stand OK">2·stand</button>
      <button data-crowding="3" class="crowd-btn" title="sardine">3·sardine</button>
    </div>
    <div class="anomaly">
      <label class="ctl-label"><input type="checkbox" id="anomaly-toggle"> Anomalous</label>
      <input type="text" id="anomaly-reason" maxlength="24" placeholder="one word" hidden>
    </div>
    <div id="end-slot"></div>
    <div id="discard-slot"></div>
  </section>

  <!-- bottom-anchored: column-reverse, so the first child (#options, with the
       highest-ranked slider first) is pinned to the bottom; the fold sits above
       and expands upward; the toast above everything the thumb uses -->
  <main id="board">
    <div id="options"></div>
    <div id="more-fold" hidden>
      <button id="more-toggle" class="fold-toggle">more…</button>
      <div id="more-options"></div>
    </div>
    <div id="undo-toast" class="toast" hidden>
      <span id="undo-text">Logged</span>
      <button id="undo-btn">Undo</button>
    </div>
  </main>

  <div id="pull-refresh" class="pull-refresh">↓ pull to re-rank</div>
</div>

<script src="static/app.js"></script>
