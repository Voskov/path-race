<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Path Race — stats</title>
<link rel="icon" href="static/icon.svg">
<style>
:root{--bg:#0b0e14;--panel:#141924;--line:#2a3446;--text:#e6ecf5;--dim:#8494ad;
  --accent:#3ba0ff;--warn:#ffb020;--danger:#ff5964}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 system-ui,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1000px;margin:0 auto;padding:16px}
h1{font-size:20px;margin:6px 0}
a{color:var(--accent)}
.toolbar{display:flex;gap:14px;align-items:center;margin:10px 0 18px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:720px){.grid{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
.panel h2{font-size:14px;margin:0 0 10px;color:var(--dim);text-transform:uppercase;letter-spacing:.03em}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:6px 8px;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
.opt-name{font-weight:600;color:var(--text)}
.seg{color:var(--dim);font-size:12px}
.subhead{color:var(--dim);font-size:11px;text-transform:uppercase}
.log td{font-size:12.5px}
.flag{font-size:11px;padding:2px 6px;border-radius:6px;background:#2a2340;color:#b79bff;margin-right:4px}
.flag.anom{background:#3a2a1a;color:var(--warn)}
.flag.disc{background:#3a1e22;color:var(--danger)}
button.mini{background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:6px;
  padding:3px 8px;font-size:12px;cursor:pointer}
.muted{color:var(--dim)}
tr.editor td{background:#0d111b;text-align:left;padding:12px}
.etap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:5px 0;border-bottom:1px dashed var(--line)}
.etap .ekey{flex:0 0 210px;font-weight:600;font-size:12.5px}
.etap.deleted .ekey,.etap.deleted input{text-decoration:line-through;opacity:.45}
.etap input[type=datetime-local],.efields select,.efields input[type=text]{
  background:#0b0e14;color:var(--text);border:1px solid var(--line);border-radius:6px;
  padding:3px 6px;font-size:12.5px;color-scheme:dark}
.etap .delta{min-width:56px;color:var(--warn);font-size:12px}
.efields{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:12px 0 0}
button.commit{background:var(--accent);border:none;color:#04121f;font-weight:700;
  border-radius:8px;padding:6px 14px;cursor:pointer}
</style>

<div class="wrap">
  <h1>Path Race — stats</h1>
  <div class="toolbar">
    <a href=".">← logger</a>
    <label><input type="checkbox" id="incl-anom"> include anomalous</label>
    <span class="muted" id="meta"></span>
  </div>

  <div class="grid" id="panels"></div>

  <h2 style="margin-top:26px">Trip log</h2>
  <div class="panel"><table class="log" id="log"></table></div>
</div>

<script>
const PREFIX = location.pathname.replace(/\/stats\/?$/, '');
const API = p => `${PREFIX}/api${p}`;
const fmt = ms => ms==null ? '—' : `${(Math.round(ms/1000)/60|0)}m ${Math.round(ms/1000)%60}s`;
const EXPS = [['boarding','morning'],['boarding','evening'],['office','morning'],['office','evening']];
const TITLES = {boarding:'Boarding option',office:'Office station'};

async function loadStats(){
  const incl = document.getElementById('incl-anom').checked;
  const s = await (await fetch(API(`/stats?include_anomalous=${incl}`))).json();
  document.getElementById('meta').textContent =
    `ToD split: morning ${s.tod_boundaries.morning}, evening ${s.tod_boundaries.evening} · generated ${s.generated_at.slice(0,19)}`;
  const root = document.getElementById('panels'); root.innerHTML='';
  for (const [exp,dir] of EXPS){
    const panel = (s.panels[exp]||{})[dir] || {options:{}};
    root.appendChild(renderPanel(exp,dir,panel));
  }
}
function renderPanel(exp,dir,panel){
  const el = document.createElement('div'); el.className='panel';
  let html = `<h2>${TITLES[exp]} · ${dir}</h2>`;
  const opts = panel.options||{};
  const keys = Object.keys(opts);
  if(!keys.length){ el.innerHTML = html+`<p class="muted">No trips yet.</p>`; return el; }
  html += `<table><tr><th>Option</th><th>n</th><th>mean</th><th>median</th><th>crowd</th></tr>`;
  for(const k of keys){
    const o=opts[k];
    html += `<tr><td class="opt-name">${k}</td><td>${o.count}</td><td>${fmt(o.mean_ms)}</td>`
      + `<td>${fmt(o.median_ms)}</td><td>${o.avg_crowding??'—'}</td></tr>`;
    // ToD split
    const t=o.tod;
    html += `<tr class="seg"><td>&nbsp;&nbsp;early</td><td>${t.early.count}</td><td>${fmt(t.early.mean_ms)}</td><td>${fmt(t.early.median_ms)}</td><td>${t.early.avg_crowding??'—'}</td></tr>`;
    html += `<tr class="seg"><td>&nbsp;&nbsp;late</td><td>${t.late.count}</td><td>${fmt(t.late.mean_ms)}</td><td>${fmt(t.late.median_ms)}</td><td>${t.late.avg_crowding??'—'}</td></tr>`;
    // segments (diagnosis, subordinate)
    if(o.segments && o.segments.length){
      html += `<tr class="seg"><td colspan="5"><span class="subhead">segments</span></td></tr>`;
      for(const sg of o.segments)
        html += `<tr class="seg"><td colspan="2">${sg.from} → ${sg.to}</td><td colspan="2">${fmt(sg.mean_ms)}</td><td>×${sg.count}</td></tr>`;
    }
  }
  html += `</table>`;
  el.innerHTML=html; return el;
}

async function loadLog(){
  closeEditor();  // the table is about to be rebuilt under it
  const {trips} = await (await fetch(API('/trips?limit=300'))).json();
  const t = document.getElementById('log');
  let html = `<tr><th>Date</th><th>Dir</th><th>Board</th><th>Office</th><th>Total</th><th>Crowd</th><th>Flags</th><th></th></tr>`;
  for(const tr of trips){
    const flags = [];
    if(tr.status==='discarded') flags.push('<span class="flag disc">discarded</span>');
    if(tr.partial) flags.push('<span class="flag">partial</span>');
    if(tr.anomalous) flags.push(`<span class="flag anom">anom${tr.anomaly_reason?': '+tr.anomaly_reason:''}</span>`);
    if(tr.untrusted_taps) flags.push(`<span class="flag">${tr.untrusted_taps} untrusted</span>`);
    html += `<tr>
      <td>${tr.date?tr.date.slice(0,16).replace('T',' '):'—'}</td>
      <td>${tr.direction}</td>
      <td>${tr.boarding_option||'—'}</td>
      <td>${tr.office_station||'—'}</td>
      <td>${fmt(tr.total_ms)}</td>
      <td>${tr.crowding??'—'}</td>
      <td>${flags.join('')||'<span class="muted">—</span>'}</td>
      <td>
        <button class="mini" data-id="${tr.id}" data-act="disc">${tr.status==='discarded'?'undiscard':'discard'}</button>
        <button class="mini" data-id="${tr.id}" data-act="anom">${tr.anomalous?'un-anom':'anom'}</button>
        ${tr.status!=='active'?`<button class="mini" data-id="${tr.id}" data-act="edit">edit</button>`:''}
      </td></tr>`;
  }
  t.innerHTML = html;
  t.querySelectorAll('button.mini').forEach(b => b.onclick = () =>
    b.dataset.act==='edit' ? toggleEditor(b.dataset.id, b.closest('tr'))
                           : toggle(b.dataset.id, b.dataset.act, trips));
}

/* ---- inline trip editor ---------------------------------------------------
 * Expand a log row into an editor: retime taps (nudge buttons or the field),
 * delete a bogus tap, set crowding/anomalous/reason/status. One Commit sends
 * everything atomically; the server re-derives started_at/completed_at and
 * recomputes ts_trusted, so retiming an untrusted tap is what restores it. */
let ED = null;
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const tsToLocal = ms => { const d=new Date(ms), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; };
const fmtDelta = d => { if(!d) return ''; const s=Math.round(Math.abs(d)/1000);
  return (d<0?'−':'+') + (s>=60 ? `${(s/60)|0}m ${s%60}s` : `${s}s`); };

function closeEditor(){ if(ED){ ED.row.remove(); ED=null; } }

async function toggleEditor(id, rowEl){
  if(ED && ED.id===id){ closeEditor(); return; }
  closeEditor();
  const d = await (await fetch(API(`/trips/${id}`))).json();
  ED = {
    id, trip: d.trip,
    taps: d.taps.map(t=>({id:t.id, key:t.checkpoint_key, ts0:t.client_ts,
                          ts:t.client_ts, trusted:t.ts_trusted, del:false})),
    row: document.createElement('tr'),
  };
  ED.row.className='editor';
  ED.row.innerHTML = `<td colspan="8">${renderEditor()}</td>`;
  rowEl.after(ED.row);
  wireEditor();
}

function renderEditor(){
  const rows = ED.taps.map((t,i)=>`
    <div class="etap${t.del?' deleted':''}" data-i="${i}">
      <span class="ekey">${t.key}${t.trusted?'':' <span class="flag anom">untrusted</span>'}</span>
      <input type="datetime-local" step="1" value="${tsToLocal(t.ts)}">
      <span class="delta">${fmtDelta(t.ts-t.ts0)}</span>
      ${[-60,-10,-1,1,10,60].map(d=>`<button class="mini nudge" data-d="${d}">${d<0?'−':'+'}${Math.abs(d)}s</button>`).join('')}
      <button class="mini edel">${t.del?'restore':'delete'}</button>
    </div>`).join('');
  const tr = ED.trip;
  return `
    <div>${rows}</div>
    <div class="efields">
      <label>status <select id="e-status">
        <option value="done"${tr.status==='done'?' selected':''}>done</option>
        <option value="discarded"${tr.status==='discarded'?' selected':''}>discarded</option>
      </select></label>
      <label>crowding <select id="e-crowd">
        <option value="">—</option>
        ${[1,2,3].map(c=>`<option value="${c}"${tr.crowding===c?' selected':''}>${c}</option>`).join('')}
      </select></label>
      <label><input type="checkbox" id="e-anom"${tr.anomalous?' checked':''}> anomalous</label>
      <label>reason <input type="text" id="e-reason" value="${esc(tr.anomaly_reason||'')}" placeholder="one word"></label>
    </div>
    <div class="efields">
      <button class="commit" id="e-commit">Commit changes</button>
      <button class="mini" id="e-cancel">Cancel</button>
      <span class="muted">Times are local. Untouched taps keep their exact stored timestamps.</span>
    </div>`;
}

function wireEditor(){
  ED.row.querySelectorAll('.etap').forEach(el=>{
    const t = ED.taps[Number(el.dataset.i)];
    const input = el.querySelector('input[type=datetime-local]');
    const delta = el.querySelector('.delta');
    const sync = ()=>{ input.value=tsToLocal(t.ts); delta.textContent=fmtDelta(t.ts-t.ts0); };
    input.onchange = ()=>{ const ms=new Date(input.value).getTime(); if(!isNaN(ms)) t.ts=ms; sync(); };
    el.querySelectorAll('.nudge').forEach(b=>b.onclick=()=>{ t.ts+=Number(b.dataset.d)*1000; sync(); });
    el.querySelector('.edel').onclick = ev=>{
      t.del=!t.del; el.classList.toggle('deleted',t.del);
      ev.target.textContent=t.del?'restore':'delete';
    };
  });
  ED.row.querySelector('#e-commit').onclick = commitEditor;
  ED.row.querySelector('#e-cancel').onclick = closeEditor;
}

async function commitEditor(){
  const body = {taps: []};
  for(const t of ED.taps){
    if(t.del) body.taps.push({id:t.id, delete:true});
    else if(t.ts!==t.ts0) body.taps.push({id:t.id, client_ts:t.ts});
  }
  const q = s=>ED.row.querySelector(s);
  const status=q('#e-status').value, crowd=q('#e-crowd').value,
        anom=q('#e-anom').checked, reason=q('#e-reason').value.trim();
  if(status!==ED.trip.status) body.status=status;
  if(crowd && Number(crowd)!==ED.trip.crowding) body.crowding=Number(crowd);
  if(anom!==ED.trip.anomalous) body.anomalous=anom;
  if(reason!==(ED.trip.anomaly_reason||'')) body.anomaly_reason=reason;
  const r = await fetch(API(`/trips/${ED.id}/edit`),
    {method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){
    const e = await r.json().catch(()=>({}));
    alert(`Edit rejected: ${typeof e.detail==='string'?e.detail:r.status}`);
    return;
  }
  closeEditor(); refresh();
}
async function toggle(id, act, trips){
  const tr = trips.find(x=>x.id===id);
  const body = act==='disc'
    ? {status: tr.status==='discarded'?'done':'discarded'}
    : {anomalous: !tr.anomalous};
  await fetch(API(`/trips/${id}`),{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  refresh();
}
function refresh(){ loadStats(); loadLog(); }
document.getElementById('incl-anom').onchange = loadStats;
refresh();
</script>
