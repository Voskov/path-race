# Path Race — nginx reverse-proxy config for the shared `infra` proxy.
# Copy to  infra/nginx/conf.d/pathrace.conf , replace FQDN below, then:
#   ./init-cert.sh <FQDN>      (bootstraps the Let's Encrypt cert + reloads)
#
# The app serves everything under the secret path prefix (PATH_PREFIX). This
# subdomain existing is fine — the bare site exposes nothing; the prefix is the
# secret. proxy_pass keeps the full URI, so no path rewriting is needed.

# HTTP — redirect to HTTPS, and serve certbot challenges
server {
    listen 80;
    server_name pathrace.voskov-shif.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name pathrace.voskov-shif.com;

    ssl_certificate /etc/letsencrypt/live/pathrace.voskov-shif.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pathrace.voskov-shif.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://pathrace:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
